     File: pages/barcode.html
============================================================ -->
<div id="barcode" class="page">

  <div class="barcode-card">

    <!-- Logo UIN — tampil di layar dan saat print -->
    <div style="text-align:center; margin-bottom:14px;">
      <img src="img/logo-uin.png" alt="Logo UIN Jakarta"
           onerror="this.style.display='none'"
           style="width:80px; height:auto; display:block; margin:0 auto;" />
    </div>

    <h2 style="font-size:17px; font-weight:700; margin-bottom:6px; text-align:center;">
      Peminjaman Disetujui!
    </h2>
    <p style="font-size:12px; color:var(--gray-3); text-align:center; margin-bottom:0;">
      Tunjukkan barcode ini kepada petugas saat pengambilan fasilitas.
    </p>

    <!-- Container barcode -->
    <div id="barcodeWrap" style="background:#f8f9fa; border-radius:8px; margin:16px 0;
         padding:16px; display:flex; justify-content:center; align-items:center;
         min-height:130px; flex-direction:column;">
      <svg id="barcodeCanvas" style="display:block; max-width:100%;"></svg>
    </div>

    <!-- Detail booking -->
    <table class="detail-table">
      <tr><td>Nama</td>          <td style="font-weight:500" id="barcodeNama">-</td></tr>
      <tr><td>Fasilitas</td>     <td style="font-weight:500" id="barcodeFasilitas">-</td></tr>
      <tr><td>Tanggal</td>       <td style="font-weight:500" id="barcodeTanggal">-</td></tr>
      <tr><td>Waktu</td>         <td style="font-weight:500" id="barcodeWaktu">-</td></tr>
      <tr><td>Tujuan</td>        <td style="font-weight:500" id="barcodeTujuan">-</td></tr>
      <tr><td>Jumlah Peserta</td><td style="font-weight:500" id="barcodePeserta">-</td></tr>
    </table>

    <p style="font-size:11px; color:var(--gray-3); margin-top:10px; text-align:center;">
      Barcode hanya berlaku pada tanggal dan waktu yang sudah ditentukan.
    </p>

    <div class="btn-row barcode-screen-only">
      <button class="btn-outline" onclick="window.print()">🖨 Cetak / Simpan</button>
      <button class="btn-primary" style="border:none; cursor:pointer" onclick="go('beranda')">
        Kembali ke Beranda
      </button>
    </div>

  </div>

</div>
