<!-- ============================================================
     HALAMAN 4: FORM PEMINJAMAN
     File: pages/form.html
     Sinkron: semua id input → submitForm() di main.js
              id="inputTanggal" → onDayClick() di calendar.js
              id="selectFasilitas" → showDetail() di main.js (auto-isi)
============================================================ -->
<div id="form" class="page">

  <div class="step-indicator">
    <div class="step done"><div class="step-num">✓</div> Pilih Fasilitas</div>
    <div class="step-arr">›</div>
    <div class="step active"><div class="step-num">2</div> Isi Form</div>
    <div class="step-arr">›</div>
    <div class="step"><div class="step-num">3</div> Verifikasi</div>
    <div class="step-arr">›</div>
    <div class="step"><div class="step-num">4</div> Disetujui</div>
    <div class="step-arr">›</div>
    <div class="step"><div class="step-num">5</div> Barcode</div>
  </div>

  <div class="form-card">
    <div class="form-title">Form Peminjaman Fasilitas</div>
    <!-- id="formAlert" diinjeksi oleh tampilAlert() di main.js jika ada error -->

    <div class="form-grid">

      <div class="form-group">
        <label>Nama Lengkap <span>*</span></label>
        <input type="text" id="inputNama" placeholder="Masukkan nama lengkap" />
      </div>

      <div class="form-group">
        <label>NIM <span>*</span></label>
        <input type="text" id="inputNim" placeholder="Masukkan NIM" />
      </div>

      <div class="form-group">
        <label>Email <span>*</span></label>
        <input type="email" id="inputEmail" placeholder="contoh@uinjkt.ac.id" />
      </div>

      <div class="form-group">
        <label>No. HP <span>*</span></label>
        <input type="text" id="inputNoHp" placeholder="08xxxxxxxxxx" />
      </div>

      <div class="form-group">
        <label>Fasilitas <span>*</span></label>
        <!-- id="selectFasilitas" diisi otomatis oleh showDetail() di main.js -->
        <select id="selectFasilitas">
          <option value="">-- Pilih Fasilitas --</option>
          <option>Aula Student Center</option>
          <option>Ruang Seminar</option>
          <option>Proyektor LCD</option>
          <option>Sound System</option>
          <option>Alat Musik</option>
          <option>Sepeda Listrik</option>
          <option>Lab Komputer</option>
        </select>
      </div>

      <div class="form-group">
        <label>Tanggal Peminjaman <span>*</span></label>
        <input type="date" id="inputTanggal" />
      </div>

      <div class="form-group">
        <label>Jam Mulai <span>*</span></label>
        <input type="time" id="inputJamMulai" />
      </div>

      <div class="form-group">
        <label>Jam Selesai <span>*</span></label>
        <input type="time" id="inputJamSelesai" />
      </div>

      <div class="form-group">
        <label>Tujuan Penggunaan <span>*</span></label>
        <input type="text" id="inputTujuan" placeholder="Contoh: Seminar Pendidikan" />
      </div>

      <div class="form-group">
        <label>Jumlah Peserta <span>*</span></label>
        <input type="number" id="inputPeserta" placeholder="Contoh: 100" min="1" />
      </div>

    </div>

    <!--
      id="btnKirim" dipakai oleh submitForm() di main.js
      untuk disable tombol saat loading dan restore setelah selesai
    -->
    <button class="btn-ajukan" id="btnKirim" onclick="submitForm()" style="margin-top:20px">
      Kirim Pengajuan
    </button>

    <p class="form-note">
      Dengan mengirimkan pengajuan, Anda menyetujui
      <a href="#">syarat dan ketentuan</a> yang berlaku.
    </p>
  </div>

</div>
